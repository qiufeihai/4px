name: GUI Build Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. v0.6.0)"
        required: true
        default: "v0.0.0"

jobs:
  build-gui:
    name: Build GUI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    env:
      WAILS_VERSION: "v2.12.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/go/go.mod
          cache: true
          cache-dependency-path: apps/go/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/go/gui/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: apps/go/gui/frontend
        run: npm ci --no-audit --fund=false

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@"$WAILS_VERSION"

      - name: Build GUI (macOS)
        if: runner.os == 'macOS'
        working-directory: apps/go/gui
        run: |
          "$(go env GOPATH)/bin/wails" build

      - name: Build GUI (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/go/gui
        shell: pwsh
        run: |
          $wails = "$(go env GOPATH)\bin\wails.exe"
          & $wails build

      - name: Prepare artifact metadata (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          GITSHA="$(git rev-parse --short HEAD)"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            arm64|aarch64) ARCH="arm64" ;;
          esac
          APP_PATH="$(find apps/go/gui/build/bin -maxdepth 1 -name "*.app" -type d | head -n 1)"
          test -n "$APP_PATH"
          ARTIFACT="4px-client_${VERSION}_darwin_${ARCH}_${GITSHA}"
          # Upload parent bin dir (instead of .app dir itself) so extracted artifact
          # keeps the *.app bundle folder and can be launched directly.
          echo "ARTIFACT_PATH=apps/go/gui/build/bin" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Prepare artifact metadata (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $gitsha = (git rev-parse --short HEAD).Trim()
          $artifact = "4px-client_${version}_windows_amd64_${gitsha}"
          $binDir = "apps/go/gui/build/bin"
          if (-not (Test-Path $binDir)) { throw "build/bin not found" }
          "ARTIFACT_PATH=$binDir/*" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ARTIFACT_NAME=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
