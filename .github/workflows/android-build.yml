name: Android Build Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. v0.6.0)"
        required: true
        default: "v0.0.0"

jobs:
  build-android:
    name: Build Android (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/go/go.mod
          cache: true
          cache-dependency-path: apps/go/go.sum

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK and gomobile
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973
            ~/.cache/gomobile
          key: ${{ runner.os }}-android-ndk27-gomobile-v1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android components
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"

      - name: Install gomobile
        shell: bash
        working-directory: apps/go
        run: |
          set -euo pipefail
          MOBILE_VERSION="v0.0.0-20260508232728-bebd421c7fa8"
          go get golang.org/x/mobile/bind@"$MOBILE_VERSION"
          go install golang.org/x/mobile/cmd/gomobile@"$MOBILE_VERSION"
          go install golang.org/x/mobile/cmd/gobind@"$MOBILE_VERSION"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          gomobile init

      - name: Build tun2socks AAR
        shell: bash
        working-directory: apps/go
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973
        run: |
          set -euo pipefail
          gomobile bind -androidapi 26 -target=android/arm64,android/amd64 -o tun2socks.aar ./pkg/tunbridge
          ls -lh tun2socks.aar

      - name: Place AAR for Android app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/mobile/android/app/libs
          cp apps/go/tun2socks.aar apps/mobile/android/app/libs/tun2socks.aar

      - name: Assemble Debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle -p apps/mobile/android :app:assembleDebug --no-daemon --parallel --build-cache

      - name: Prepare artifact metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version || 'v0.0.0' }}"
          GITSHA="$(git rev-parse --short HEAD)"
          echo "APK_NAME=4px-android_${VERSION}_debug_${GITSHA}" >> "$GITHUB_ENV"
          echo "AAR_NAME=4px-tun2socks_${VERSION}_${GITSHA}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.AAR_NAME }}
          path: apps/go/tun2socks.aar
          if-no-files-found: error
