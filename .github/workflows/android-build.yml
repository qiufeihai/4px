name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment name that stores signing secrets"
        required: true
        default: "production"
      version:
        description: "Release version label (e.g. v0.8.0)"
        required: true
        default: "v0.8.0"

jobs:
  build-android:
    name: Build Android Release (ubuntu)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      MOBILE_VERSION: "v0.0.0-20260508232728-bebd421c7fa8"
      ANDROID_API_LEVEL: "34"
      ANDROID_BUILD_TOOLS: "34.0.0"
      ANDROID_NDK_VERSION: "27.0.12077973"
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache tun2socks AAR
        id: cache-aar
        uses: actions/cache@v4
        with:
          path: apps/go/tun2socks.aar
          key: ${{ runner.os }}-tun2socks-aar-${{ env.MOBILE_VERSION }}-ndk${{ env.ANDROID_NDK_VERSION }}-${{ hashFiles('apps/go/go.mod', 'apps/go/go.sum', 'apps/go/pkg/**') }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/go/go.mod
          cache: true
          cache-dependency-path: apps/go/go.sum

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK and gomobile
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
            ~/.cache/gomobile
          key: ${{ runner.os }}-android-ndk${{ env.ANDROID_NDK_VERSION }}-gomobile-${{ env.MOBILE_VERSION }}-v2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android components
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}" "ndk;${ANDROID_NDK_VERSION}"

      - name: Install gomobile
        if: steps.cache-aar.outputs.cache-hit != 'true'
        shell: bash
        working-directory: apps/go
        run: |
          set -euo pipefail
          go get golang.org/x/mobile/bind@"$MOBILE_VERSION"
          go install golang.org/x/mobile/cmd/gomobile@"$MOBILE_VERSION"
          go install golang.org/x/mobile/cmd/gobind@"$MOBILE_VERSION"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          gomobile init

      - name: Build tun2socks AAR
        if: steps.cache-aar.outputs.cache-hit != 'true'
        shell: bash
        working-directory: apps/go
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: |
          set -euo pipefail
          gomobile bind -androidapi 26 -target=android/arm64,android/amd64 -o tun2socks.aar ./pkg/tunbridge
          ls -lh tun2socks.aar

      - name: Place AAR for Android app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/mobile/android/app/libs
          cp apps/go/tun2socks.aar apps/mobile/android/app/libs/tun2socks.aar

      - name: Prepare Release signing keystore
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${ANDROID_KEYSTORE_BASE64:-}" ]] || (echo "missing secret: ANDROID_KEYSTORE_BASE64" >&2 && exit 1)
          [[ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ]] || (echo "missing secret: ANDROID_KEYSTORE_PASSWORD" >&2 && exit 1)
          [[ -n "${ANDROID_KEY_ALIAS:-}" ]] || (echo "missing secret: ANDROID_KEY_ALIAS" >&2 && exit 1)
          [[ -n "${ANDROID_KEY_PASSWORD:-}" ]] || (echo "missing secret: ANDROID_KEY_PASSWORD" >&2 && exit 1)
          KEYSTORE_PATH="$GITHUB_WORKSPACE/apps/mobile/android/app/release.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Assemble Release APK
        shell: bash
        run: |
          set -euo pipefail
          gradle -p apps/mobile/android :app:assembleRelease --no-daemon --parallel --build-cache

      - name: Verify signed APK
        shell: bash
        run: |
          set -euo pipefail
          "${ANDROID_SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner" verify -v \
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Prepare artifact metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          GITSHA="$(git rev-parse --short HEAD)"
          echo "APK_NAME=4px-android_${VERSION}_release_${GITSHA}" >> "$GITHUB_ENV"
          echo "AAR_NAME=4px-tun2socks_${VERSION}_release_${GITSHA}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.AAR_NAME }}
          path: apps/go/tun2socks.aar
          if-no-files-found: error
